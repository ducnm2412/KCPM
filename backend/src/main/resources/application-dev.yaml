spring:
  datasource:
    url: jdbc:h2:mem:confms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: none
  # Disable features that may attempt external connections in dev
  mail:
    host: ""
  data:
    redis:
      host: ""

server:
  port: 8080

logging:
  level:
    com.uth: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  rate-limiting:
    enabled: false
    use-redis: false
