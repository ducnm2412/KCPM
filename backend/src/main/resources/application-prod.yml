spring:
  application:
    name: uth-confms
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uth_confms}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
    open-in-view: false
  
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  
  # OAuth2 Configuration (chỉ khi app.oauth2.enabled=true)
  security:
    oauth2:
      enabled: true
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: ${OAUTH2_REDIRECT_URI:}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: 3600000
  refresh-token-validity: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

logging:
  level:
    root: INFO
    com.uth: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
  file:
    name: ${LOG_FILE_PATH:/var/log/uth-confms/application.log}
    max-size: 10MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  file-storage:
    path: ${FILE_STORAGE_PATH:/data/uploads}
    max-size: 20971520
  storage:
    base-dir: ${STORAGE_BASE_DIR:/data/uploads}
    max-file-size-mb: ${STORAGE_MAX_FILE_SIZE_MB:20}
  email:
    verification:
      expiration-hours: 24
    from-name: ${EMAIL_FROM_NAME:UTH-ConfMS}
  ai:
    enabled: ${AI_ENABLED:true}
    confidence-threshold: ${AI_CONFIDENCE_THRESHOLD:0.5}
  frontend:
    url: ${FRONTEND_URL:https://confms.uth.edu.vn}
  pc:
    invitation:
      expiration-days: 7
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://confms.uth.edu.vn}
  rate-limiting:
    enabled: ${RATE_LIMITING_ENABLED:true}
    use-redis: ${RATE_LIMITING_USE_REDIS:true}
    auth:
      max-requests: ${RATE_LIMITING_AUTH_MAX:5}
      window-seconds: ${RATE_LIMITING_AUTH_WINDOW:60}
    api:
      max-requests: ${RATE_LIMITING_API_MAX:100}
      window-seconds: ${RATE_LIMITING_API_WINDOW:60}
  oauth2:
    enabled: ${OAUTH2_ENABLED:false}
    providers:
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
