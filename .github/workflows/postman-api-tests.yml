name: Postman API Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  postman-api-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Detect Postman tests
        id: postman-tests
        run: |
          if [ -f "postman/UTH-ConfMS API.postman_collection.json" ] \
            && [ -f "postman/UTH-ConfMS Local.postman_environment.json" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No Postman tests found on this branch. Skipping Newman run."
          fi

      - name: Set up Java 17
        if: steps.postman-tests.outputs.has_tests == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        if: steps.postman-tests.outputs.has_tests == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: npm install -g newman newman-reporter-htmlextra

      - name: Build backend
        if: steps.postman-tests.outputs.has_tests == 'true'
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Start backend with CI config
        if: steps.postman-tests.outputs.has_tests == 'true'
        working-directory: backend
        run: |
          nohup java \
            "-Dspring.profiles.active=ci" \
            "-Dserver.port=8080" \
            "-Dspring.datasource.url=jdbc:h2:mem:confms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE" \
            "-Dspring.datasource.username=sa" \
            "-Dspring.datasource.password=" \
            "-Dspring.datasource.driver-class-name=org.h2.Driver" \
            "-Dspring.jpa.hibernate.ddl-auto=create-drop" \
            "-Dspring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect" \
            -jar target/confms-1.0.0.jar \
            > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          backend_pid="$(cat backend.pid)"
          for i in {1..120}; do
            if ! kill -0 "$backend_pid" 2>/dev/null; then
              echo "Backend process exited before becoming ready"
              cat backend.log
              exit 1
            fi

            if curl -fsS http://localhost:8080/api-docs >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi

            echo "Waiting for backend... ($i/120)"
            sleep 2
          done

          echo "Backend did not start in time"
          cat backend.log
          exit 1

      - name: Create reports folder
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: mkdir -p postman/reports

      # =========================
      # LOGIN
      # =========================
      - name: Run Login API tests
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/login-test-data.json" \
            --folder "Login" \
            --env-var baseUrl="http://localhost:8080" \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export "postman/reports/login-junit.xml" \
            --reporter-htmlextra-export "postman/reports/login-report.html"

      # =========================
      # REGISTER
      # =========================
      - name: Run Register API tests
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/register-test-data.json" \
            --folder "Register" \
            --env-var baseUrl="http://localhost:8080" \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export "postman/reports/register-junit.xml" \
            --reporter-htmlextra-export "postman/reports/register-report.html"

      # =========================
      # GET ME
      # =========================
      - name: Run Get Me API tests
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/get_me_test_data.json" \
            --folder "Get Me" \
            --env-var baseUrl="http://localhost:8080" \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export "postman/reports/get-me-junit.xml" \
            --reporter-htmlextra-export "postman/reports/get-me-report.html"

      # =========================
      # UPDATE ME
      # =========================
      - name: Run Update Me API tests
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/update_me_test_data.json" \
            --folder "Update Me" \
            --env-var baseUrl="http://localhost:8080" \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export "postman/reports/update-me-junit.xml" \
            --reporter-htmlextra-export "postman/reports/update-me-report.html"

      # =========================
      # GET USER BY ID
      # =========================
      - name: Run Get User By ID API tests
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/user_by_id_test_data.json" \
            --folder "Get User By ID" \
            --env-var baseUrl="http://localhost:8080" \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export "postman/reports/user-by-id-junit.xml" \
            --reporter-htmlextra-export "postman/reports/user-by-id-report.html"

      # =========================
      # LIST USERS
      # =========================
      - name: Run List Users API tests
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/list_users_test_data.json" \
            --folder "List Users" \
            --env-var baseUrl="http://localhost:8080" \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export "postman/reports/list-users-junit.xml" \
            --reporter-htmlextra-export "postman/reports/list-users-report.html"

      # =========================
      # SEARCH USERS
      # =========================
      - name: Run Search Users API tests
        if: steps.postman-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/search_users_test_data.json" \
            --folder "Search Users" \
            --env-var baseUrl="http://localhost:8080" \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export "postman/reports/search-users-junit.xml" \
            --reporter-htmlextra-export "postman/reports/search-users-report.html"

      - name: Upload Newman reports
        if: always() && steps.postman-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: postman-newman-reports
          path: |
            postman/reports
            backend.log