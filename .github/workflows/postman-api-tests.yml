name: Postman API Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  postman-api-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Detect CFP Postman tests
        id: cfp-tests
        run: |
          if [ -f "postman/UTH-ConfMS API.postman_collection.json" ] \
            && [ -f "postman/UTH-ConfMS Local.postman_environment.json" ] \
            && [ -f "postman/cfp-get-by-conference-data.json" ] \
            && [ -f "postman/cfp-create-update-data.json" ] \
            && [ -f "postman/cfp-publish-data.json" ] \
            && [ -f "postman/cfp-close-data.json" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No CFP Postman tests found on this branch."
          fi

      - name: Set up Java 17
        if: steps.cfp-tests.outputs.has_tests == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        if: steps.cfp-tests.outputs.has_tests == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        if: steps.cfp-tests.outputs.has_tests == 'true'
        run: npm install -g newman newman-reporter-htmlextra

      - name: Build backend
        if: steps.cfp-tests.outputs.has_tests == 'true'
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Start backend
        if: steps.cfp-tests.outputs.has_tests == 'true'
        working-directory: backend
        run: |
          nohup java \
            "-Dspring.profiles.active=ci" \
            "-Dserver.port=8080" \
            "-Dspring.datasource.url=jdbc:h2:mem:confms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE" \
            "-Dspring.datasource.username=sa" \
            "-Dspring.datasource.password=" \
            "-Dspring.datasource.driver-class-name=org.h2.Driver" \
            "-Dspring.jpa.hibernate.ddl-auto=create-drop" \
            "-Dspring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect" \
            "-Dspring.mail.host=localhost" \
            "-Dapp.oauth2.enabled=false" \
            "-Dspring.security.oauth2.client.registration.google.client-id=ci-disabled" \
            "-Dspring.security.oauth2.client.registration.google.client-secret=ci-disabled" \
            -jar target/confms-1.0.0.jar \
            > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend
        if: steps.cfp-tests.outputs.has_tests == 'true'
        run: |
          for i in {1..120}; do
            if curl -fsS http://localhost:8080/api-docs >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          exit 1

      - name: Run CFP Get By Conference tests
        if: steps.cfp-tests.outputs.has_tests == 'true'
        run: |
          mkdir -p postman/reports
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/cfp-get-by-conference-data.json" \
            --folder "Get CFP By Conference" \
            --env-var baseUrl="http://localhost:8080"

      - name: Run CFP Create Update tests
        if: steps.cfp-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/cfp-create-update-data.json" \
            --folder "Create Or Update CFP" \
            --env-var baseUrl="http://localhost:8080"

      - name: Run CFP Publish tests
        if: steps.cfp-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/cfp-publish-data.json" \
            --folder "Publish CFP" \
            --env-var baseUrl="http://localhost:8080"

      - name: Run CFP Close tests
        if: steps.cfp-tests.outputs.has_tests == 'true'
        run: |
          newman run "postman/UTH-ConfMS API.postman_collection.json" \
            -e "postman/UTH-ConfMS Local.postman_environment.json" \
            -d "postman/cfp-close-data.json" \
            --folder "Close CFP" \
            --env-var baseUrl="http://localhost:8080"

      - name: Upload Newman reports
        if: always() && steps.cfp-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: postman-cfp-reports
          path: |
            postman/reports
            backend.log